<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrumpTrader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #000000;
      --surface:     #16181c;
      --surface-2:   #1e2126;
      --border:      #2f3336;
      --text-1:      #e7e9ea;
      --text-2:      #71767b;
      --accent:      #1d9bf0;
      --accent-dim:  rgba(29,155,240,0.12);
      --green:       #00ba7c;
      --green-dim:   rgba(0,186,124,0.12);
      --red:         #f4212e;
      --red-dim:     rgba(244,33,46,0.12);
      --gold:        #ffd700;
      --r:           16px;
      --r-sm:        12px;
      --sidebar-w:   240px;
      --right-w:     360px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    /* ── APP SHELL ── */
    .app {
      display: flex;
      width: 100%;
      max-width: 1265px;
      min-height: 100vh;
    }

    /* ── LEFT SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      padding: 8px 12px 24px;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: white;
      margin: 8px 0 20px 8px;
      flex-shrink: 0;
    }
    .nav-item {
      display: flex; align-items: center; gap: 16px;
      padding: 11px 14px;
      border-radius: 9999px;
      font-size: 19px; font-weight: 400;
      color: var(--text-1);
      cursor: pointer;
      transition: background 0.15s;
      width: 100%; text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,0.06); }
    .nav-item.active { font-weight: 700; }
    .nav-icon { font-size: 21px; width: 24px; text-align: center; flex-shrink: 0; }
    .nav-label { font-size: 18px; }

    /* Radar monitor box */
    .monitor-box {
      margin-top: auto;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--surface);
    }
    .monitor-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--text-2);
      margin-bottom: 12px;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(0,186,124,0.5); }
      50%      { opacity:0.7; box-shadow: 0 0 0 5px rgba(0,186,124,0); }
    }
    .radar-wrap {
      display: flex; align-items: center; justify-content: center;
      margin: 10px 0;
    }
    .radar {
      width: 60px; height: 60px; border-radius: 50%;
      border: 1px solid rgba(29,155,240,0.4);
      background: rgba(29,155,240,0.03);
      position: relative; overflow: hidden;
    }
    /* Concentric rings */
    .radar::before {
      content: '';
      position: absolute;
      inset: 15px;
      border-radius: 50%;
      border: 1px solid rgba(29,155,240,0.2);
      pointer-events: none;
    }
    /* Crosshairs */
    .radar-cross {
      position: absolute; inset: 0;
      background:
        linear-gradient(rgba(29,155,240,0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(29,155,240,0.15) 1px, transparent 1px);
      background-size: 100% 50%, 50% 100%;
    }
    .radar-sweep {
      position: absolute; inset: 0; border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent 270deg,
        rgba(29,155,240,0.6) 315deg,
        rgba(29,155,240,0.15) 360deg
      );
      animation: sweep 3s linear infinite;
    }
    .radar-dot {
      position: absolute; top: 50%; left: 50%;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
      transform: translate(-50%,-50%);
      box-shadow: 0 0 6px var(--accent);
    }
    @keyframes sweep { to { transform: rotate(360deg); } }
    .monitor-label {
      font-size: 11px; color: var(--text-2); text-align: center; line-height: 1.5;
    }
    .monitor-label strong { color: var(--accent); }
    .monitor-status {
      font-size: 11px; color: var(--text-2); text-align: center;
      margin-top: 6px; font-variant-numeric: tabular-nums;
    }

    /* ── CENTER FEED ── */
    .feed-col {
      flex: 1; min-width: 0;
      border-right: 1px solid var(--border);
      max-width: 600px;
    }
    .feed-header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .feed-tabs { display: flex; }
    .feed-tab {
      flex: 1; padding: 15px 0; text-align: center;
      font-size: 15px; font-weight: 600;
      color: var(--text-2); cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .feed-tab.active { color: var(--text-1); border-bottom-color: var(--accent); }
    .feed-tab:hover { background: rgba(255,255,255,0.03); }
    .scan-bar {
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
      animation: scan-anim 2.5s ease-in-out infinite;
      opacity: 0.5;
    }
    @keyframes scan-anim {
      0%   { transform: scaleX(0) translateX(-100%); }
      50%  { transform: scaleX(1) translateX(0%); }
      100% { transform: scaleX(0) translateX(100%); }
    }

    /* New posts banner */
    .new-banner {
      display: none; align-items: center; justify-content: center; gap: 8px;
      padding: 12px; cursor: pointer;
      color: var(--accent); font-size: 14px; font-weight: 600;
      border-bottom: 1px solid var(--border);
      background: var(--accent-dim);
      transition: background 0.15s;
    }
    .new-banner:hover { background: rgba(29,155,240,0.2); }
    .new-banner.show { display: flex; }

    /* ── POST CARD ── */
    .post-card {
      display: flex; gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }
    .post-card:hover { background: rgba(255,255,255,0.03); }
    .post-card.selected {
      background: var(--accent-dim);
      border-left: 3px solid var(--accent);
      padding-left: 13px;
    }
    @keyframes flash-new {
      0%   { background: rgba(29,155,240,0.2); }
      100% { background: transparent; }
    }
    .post-card.flash { animation: flash-new 1.2s ease-out forwards; }

    .avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, #1877f2 0%, #c13584 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 900; color: white;
      flex-shrink: 0;
    }
    .post-body { flex: 1; min-width: 0; }
    .post-head {
      display: flex; align-items: center; gap: 5px;
      flex-wrap: wrap; margin-bottom: 3px;
    }
    .post-name { font-weight: 700; font-size: 15px; }
    .post-check { color: var(--accent); font-size: 14px; }
    .post-handle { color: var(--text-2); font-size: 14px; }
    .post-age { color: var(--text-2); font-size: 14px; margin-left: auto; }
    .post-text {
      font-size: 15px; line-height: 1.6;
      color: var(--text-1); word-break: break-word;
      margin-bottom: 10px;
    }
    .post-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 9999px;
      font-size: 12px; font-weight: 700;
      border: 1px solid transparent;
    }
    .pill-buy  { background: var(--green-dim); color: var(--green); border-color: rgba(0,186,124,0.3); }
    .pill-sell { background: var(--red-dim);   color: var(--red);   border-color: rgba(244,33,46,0.3); }
    .pill-none { background: rgba(113,118,123,0.1); color: var(--text-2); border-color: var(--border); }
    .pill-conf { background: var(--surface); color: var(--text-2); border-color: var(--border); font-weight: 500; }

    /* ── RIGHT PANEL ── */
    .right-panel {
      width: var(--right-w); flex-shrink: 0;
      position: sticky; top: 0; height: 100vh;
      overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* Empty / placeholder */
    .rp-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; color: var(--text-2); gap: 12px;
      padding: 32px;
    }
    .rp-empty-icon { font-size: 44px; }
    .rp-empty-title { font-size: 22px; font-weight: 800; color: var(--text-1); }
    .rp-empty-sub { font-size: 14px; line-height: 1.7; }

    /* Trade header */
    .rp-instr-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .rp-instr { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
    .rp-dir {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 14px; border-radius: 9999px;
      font-size: 14px; font-weight: 700;
    }
    .rp-dir-buy  { background: var(--green-dim); color: var(--green); }
    .rp-dir-sell { background: var(--red-dim);   color: var(--red);   }

    /* Outcome badge */
    .outcome-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 9999px;
      font-size: 13px; font-weight: 700;
      border: 1px solid transparent;
    }
    .ob-open   { background: rgba(255,215,0,0.1);  color: var(--gold);  border-color: rgba(255,215,0,0.3); }
    .ob-target { background: var(--green-dim); color: var(--green); border-color: rgba(0,186,124,0.3); }
    .ob-stop   { background: var(--red-dim);   color: var(--red);   border-color: rgba(244,33,46,0.3); }
    .ob-time   { background: rgba(113,118,123,0.1); color: var(--text-2); border-color: var(--border); }

    /* P&L card */
    .pnl-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .pnl-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-2); margin-bottom: 4px; }
    .pnl-number { font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .pnl-pos { color: var(--green); }
    .pnl-neg { color: var(--red); }

    /* Chart embed */
    .chart-embed {
      border-radius: var(--r-sm); overflow: hidden;
      border: 1px solid var(--border);
    }

    /* Levels card */
    .levels-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); overflow: hidden;
    }
    .levels-head {
      padding: 9px 14px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text-2);
      background: var(--surface-2); border-bottom: 1px solid var(--border);
    }
    .levels-grid { display: grid; grid-template-columns: repeat(3,1fr); }
    .level-cell {
      padding: 12px; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 4px;
    }
    .level-cell:last-child { border-right: none; }
    .lc-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-2); }
    .lc-val { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .lc-entry { color: var(--accent); }
    .lc-stop  { color: var(--red); }
    .lc-tgt   { color: var(--green); }

    /* Post excerpt */
    .post-excerpt {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 14px;
    }
    .pe-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-2); margin-bottom: 6px; }
    .pe-text { font-size: 14px; line-height: 1.6; color: var(--text-1); }
    .pe-reasoning { font-size: 12px; color: var(--text-2); font-style: italic; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

    /* CTA */
    .btn-chart {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px;
      background: var(--accent); color: white;
      border-radius: 9999px; font-size: 15px; font-weight: 700;
      transition: background 0.15s; cursor: pointer; border: none;
    }
    .btn-chart:hover { background: #1a8cd8; }

    .no-signal-msg {
      text-align: center; padding: 24px;
      color: var(--text-2); font-size: 14px; line-height: 1.7;
    }

    /* ── ANALYTICS PAGE ── */
    .analytics-page {
      display: none; position: fixed; inset: 0;
      background: var(--bg); z-index: 100; overflow-y: auto; padding: 28px 32px;
    }
    .analytics-page.show { display: block; }
    .ap-back {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--accent); font-size: 15px; font-weight: 600;
      cursor: pointer; margin-bottom: 28px;
    }
    .ap-back:hover { text-decoration: underline; }
    .ap-title { font-size: 26px; font-weight: 800; margin-bottom: 24px; }
    .ap-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px; max-width: 900px; margin-bottom: 36px;
    }
    .ap-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 20px;
    }
    .ap-box-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-2); margin-bottom: 8px; }
    .ap-box-value { font-size: 34px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -1px; }

    /* ── FEED EMPTY ── */
    .feed-empty {
      padding: 64px 24px; text-align: center; color: var(--text-2);
    }
    .feed-empty-icon { font-size: 48px; margin-bottom: 16px; }
    .feed-empty-title { font-size: 22px; font-weight: 800; color: var(--text-1); margin-bottom: 8px; }
    .feed-empty-sub { font-size: 15px; line-height: 1.7; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) { :root { --right-w: 300px; } }
    @media (max-width: 900px) {
      .sidebar { width: 72px; padding: 8px; }
      .nav-label, .monitor-box { display: none; }
      .logo { margin-left: 4px; }
    }
    @media (max-width: 700px) {
      .right-panel { display: none; }
    }
    @media (max-width: 500px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── LEFT SIDEBAR ── -->
  <nav class="sidebar">
    <div class="logo">T</div>

    <button class="nav-item active" id="nav-home" onclick="showHome()">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" id="nav-analytics" onclick="showAnalytics()">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Analytics</span>
    </button>

    <div class="monitor-box">
      <div class="monitor-title"><div class="live-dot"></div>Live Monitor</div>
      <div class="radar-wrap">
        <div class="radar">
          <div class="radar-cross"></div>
          <div class="radar-sweep"></div>
          <div class="radar-dot"></div>
        </div>
      </div>
      <div class="monitor-label">Watching <strong>@realDonaldTrump</strong></div>
      <div class="monitor-status" id="monitor-status">Connecting...</div>
    </div>
  </nav>

  <!-- ── CENTER FEED ── -->
  <main class="feed-col">
    <div class="feed-header">
      <div class="feed-tabs">
        <div class="feed-tab active" id="tab-all" onclick="setTab('all')">Live Feed</div>
        <div class="feed-tab" id="tab-signals" onclick="setTab('signals')">Signals Only</div>
      </div>
      <div class="scan-bar"></div>
    </div>
    <div class="new-banner" id="new-banner" onclick="showNewPosts()">
      ↑ New posts detected — tap to load
    </div>
    <div id="feed"></div>
  </main>

  <!-- ── RIGHT PANEL ── -->
  <aside class="right-panel">
    <div class="rp-empty" id="rp-empty">
      <div class="rp-empty-icon">📡</div>
      <div class="rp-empty-title">Select a post</div>
      <div class="rp-empty-sub">Tap any post in the feed to view its AI classification and trade signal.</div>
    </div>
    <div id="rp-trade" style="display:none"></div>
  </aside>

</div>

<!-- ── ANALYTICS PAGE ── -->
<div class="analytics-page" id="analytics-page">
  <div class="ap-back" onclick="showHome()">← Back to feed</div>
  <div class="ap-title">Analytics</div>
  <div class="ap-grid" id="ap-grid"></div>
</div>

<script>
  const SB_URL = 'https://hhnkojvtecsighomybyl.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhobmtvanZ0ZWNzaWdob215YnlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODgzNDEsImV4cCI6MjA5NDk2NDM0MX0.t6-LKo2zYi3wSt62jirkB3f1y0C81yX6eWKX4jZpOnc';

  const TV_MAP = {
    NQ:'NASDAQ:QQQ', ES:'AMEX:SPY', BTC:'BINANCE:BTCUSDT',
    GLD:'AMEX:GLD', SPY:'AMEX:SPY', QQQ:'NASDAQ:QQQ',
    AAPL:'NASDAQ:AAPL', PLTR:'NASDAQ:PLTR', TSLA:'NASDAQ:TSLA',
    NVDA:'NASDAQ:NVDA', MSFT:'NASDAQ:MSFT', AMZN:'NASDAQ:AMZN',
    META:'NASDAQ:META', DJT:'NASDAQ:DJT', 'BTC-USD':'BINANCE:BTCUSDT',
  };

  function tvSym(i) { return TV_MAP[(i||'').toUpperCase()] || (i||'').toUpperCase(); }
  function tvUrl(i) { return 'https://www.tradingview.com/chart/?symbol=' + encodeURIComponent(tvSym(i)); }
  function fmtP(v) {
    if (v==null) return '—';
    if (v>10000) return v.toLocaleString('en-US',{maximumFractionDigits:0});
    if (v>1000)  return v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    if (v>100)   return v.toFixed(2);
    if (v>1)     return v.toFixed(4);
    return v.toFixed(6);
  }
  function ago(d) {
    if (!d) return '';
    const s = Math.floor((Date.now()-new Date(d).getTime())/1000);
    if (s<60)  return 'just now';
    if (s<3600) return Math.floor(s/60)+'m ago';
    if (s<86400) return Math.floor(s/3600)+'h ago';
    return Math.floor(s/86400)+'d ago';
  }
  function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

  // ── STATE ──
  let posts=[], clsMap={}, sigMap={};
  let selectedId=null, tab='all', lastLoad=null;
  let pendingNewIds=[];

  // ── NAV ──
  function showHome() {
    document.getElementById('analytics-page').classList.remove('show');
    document.getElementById('nav-home').classList.add('active');
    document.getElementById('nav-analytics').classList.remove('active');
  }
  function showAnalytics() {
    document.getElementById('analytics-page').classList.add('show');
    document.getElementById('nav-home').classList.remove('active');
    document.getElementById('nav-analytics').classList.add('active');
    renderAnalytics();
  }

  // ── TABS ──
  function setTab(t) {
    tab = t;
    document.getElementById('tab-all').classList.toggle('active', t==='all');
    document.getElementById('tab-signals').classList.toggle('active', t==='signals');
    renderFeed();
  }

  // ── SELECT POST ──
  function selectPost(id) {
    selectedId = id;
    document.querySelectorAll('.post-card').forEach(c => {
      c.classList.toggle('selected', c.dataset.id === id);
    });
    renderRightPanel(id);
  }

  // ── RENDER FEED ──
  function renderFeed(flashIds=[]) {
    const el = document.getElementById('feed');
    const visible = tab==='signals'
      ? posts.filter(p => sigMap[p.post_id]?.length)
      : posts;

    if (!visible.length) {
      el.innerHTML = `
        <div class="feed-empty">
          <div class="feed-empty-icon">📡</div>
          <div class="feed-empty-title">Monitoring Truth Social</div>
          <div class="feed-empty-sub">Watching <strong>@realDonaldTrump</strong> in real-time.<br>Posts and trade signals will appear here automatically.</div>
        </div>`;
      return;
    }

    el.innerHTML = visible.map(p => {
      const cls = clsMap[p.post_id];
      const sig = sigMap[p.post_id]?.[0];
      const isFlash = flashIds.includes(p.post_id);

      let pillHtml = '';
      if (sig) {
        const cls2 = `pill ${sig.direction==='BUY'?'pill-buy':'pill-sell'}`;
        pillHtml = `<span class="${cls2}">${sig.direction==='BUY'?'↑':'↓'} ${esc(sig.instrument)} · ${sig.direction}</span>`;
      } else if (cls) {
        pillHtml = `<span class="pill pill-none">${esc(cls.category)}</span>`;
      }
      const confHtml = cls?.confidence
        ? `<span class="pill pill-conf">${Math.round(cls.confidence*100)}%</span>` : '';

      return `
        <div class="post-card${selectedId===p.post_id?' selected':''}${isFlash?' flash':''}"
             data-id="${esc(p.post_id)}" onclick="selectPost('${esc(p.post_id)}')">
          <div class="avatar">T</div>
          <div class="post-body">
            <div class="post-head">
              <span class="post-name">Donald J. Trump</span>
              <span class="post-check">✓</span>
              <span class="post-handle">@realDonaldTrump</span>
              <span class="post-age">${ago(p.posted_at||p.created_at)}</span>
            </div>
            <div class="post-text">${esc(p.content||'')}</div>
            <div class="post-footer">${pillHtml}${confHtml}</div>
          </div>
        </div>`;
    }).join('');
  }

  // ── RENDER RIGHT PANEL ──
  function renderRightPanel(id) {
    const emptyEl = document.getElementById('rp-empty');
    const tradeEl = document.getElementById('rp-trade');

    if (!id) { emptyEl.style.display='flex'; tradeEl.style.display='none'; return; }

    const post = posts.find(p=>p.post_id===id);
    const cls  = clsMap[id];
    const sig  = sigMap[id]?.[0];

    emptyEl.style.display='none';
    tradeEl.style.display='block';

    if (!sig) {
      tradeEl.innerHTML = `
        <div class="post-excerpt">
          <div class="pe-label">Trump Post</div>
          <div class="pe-text">${esc(post?.content||'')}</div>
          ${cls?.reasoning?`<div class="pe-reasoning">${esc(cls.reasoning)}</div>`:''}
        </div>
        ${cls?`
        <div class="levels-card">
          <div class="levels-head">AI Classification</div>
          <div style="padding:14px;font-size:14px">
            <span style="font-weight:700">${esc(cls.category)}</span>
            ${cls.confidence?` · <span style="color:var(--text-2)">${Math.round(cls.confidence*100)}% confidence</span>`:''}
          </div>
        </div>`:''}
        <div class="no-signal-msg">No trade signal fired for this post.<br><span style="font-size:12px">Confidence below 75% threshold or PERSONAL_NOISE.</span></div>`;
      return;
    }

    const outcome = sig.outcome || 'OPEN';
    const badge = {
      OPEN:       '<span class="outcome-badge ob-open">⏳ Trade Open</span>',
      TARGET_HIT: '<span class="outcome-badge ob-target">✅ Target Hit</span>',
      STOP_HIT:   '<span class="outcome-badge ob-stop">❌ Stop Hit</span>',
      TIME_STOP:  '<span class="outcome-badge ob-time">⏰ Time Stop</span>',
    }[outcome] || '';

    const pnl = sig.pnl_pct;
    const pnlBlock = pnl!=null ? `
      <div class="pnl-card">
        <div>
          <div class="pnl-label">Hypothetical P&L</div>
          <div class="pnl-number ${pnl>=0?'pnl-pos':'pnl-neg'}">${pnl>=0?'+':''}${pnl.toFixed(2)}%</div>
        </div>
        <div style="font-size:36px">${pnl>=0?'🚀':'📉'}</div>
      </div>` : '';

    const stopLbl = sig.direction==='BUY'?'Stop ↓':'Stop ↑';
    const tgtLbl  = sig.direction==='BUY'?'Target ↑':'Target ↓';

    tradeEl.innerHTML = `
      <div class="rp-instr-row">
        <span class="rp-instr">${esc(sig.instrument)}</span>
        <span class="rp-dir ${sig.direction==='BUY'?'rp-dir-buy':'rp-dir-sell'}">${sig.direction==='BUY'?'↑ LONG':'↓ SHORT'}</span>
      </div>
      ${badge}
      ${pnlBlock}
      <div class="chart-embed" id="chart-embed"></div>
      <div class="levels-card">
        <div class="levels-head">Trade Levels</div>
        <div class="levels-grid">
          <div class="level-cell">
            <div class="lc-lbl">Entry</div>
            <div class="lc-val lc-entry">${fmtP(sig.entry_price)}</div>
          </div>
          <div class="level-cell">
            <div class="lc-lbl">${stopLbl}</div>
            <div class="lc-val lc-stop">${fmtP(sig.stop_price)}</div>
          </div>
          <div class="level-cell">
            <div class="lc-lbl">${tgtLbl}</div>
            <div class="lc-val lc-tgt">${fmtP(sig.target_price)}</div>
          </div>
        </div>
      </div>
      <div class="post-excerpt">
        <div class="pe-label">Trump Post</div>
        <div class="pe-text">${esc(post?.content||'')}</div>
        ${cls?.reasoning?`<div class="pe-reasoning">"${esc(cls.reasoning)}"</div>`:''}
      </div>
      <button class="btn-chart" onclick="window.open('${tvUrl(sig.instrument)}','_blank')">
        📈 Open Full Chart
      </button>`;

    renderChart(tvSym(sig.instrument));
  }

  function renderChart(sym) {
    const wrap = document.getElementById('chart-embed');
    if (!wrap) return;
    wrap.innerHTML = '';
    const outer = document.createElement('div');
    outer.style.cssText = 'height:200px;width:100%';
    const inner = document.createElement('div');
    inner.className = 'tradingview-widget-container__widget';
    inner.style.cssText = 'height:200px;width:100%';
    const s = document.createElement('script');
    s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js';
    s.async = true;
    s.innerHTML = JSON.stringify({
      symbol: sym, width:'100%', height:200,
      locale:'en', dateRange:'1D', colorTheme:'dark',
      trendLineColor:'#1d9bf0',
      underLineColor:'rgba(29,155,240,0.08)',
      underLineBottomColor:'rgba(29,155,240,0)',
      isTransparent:true, autosize:true,
      largeChartUrl:'https://www.tradingview.com/chart/?symbol='+encodeURIComponent(sym),
    });
    outer.appendChild(inner); outer.appendChild(s);
    wrap.appendChild(outer);
  }

  // ── ANALYTICS ──
  function renderAnalytics() {
    const sigs = Object.values(sigMap).flat();
    const total = sigs.length;
    const wins  = sigs.filter(s=>s.outcome==='TARGET_HIT').length;
    const losses= sigs.filter(s=>s.outcome==='STOP_HIT').length;
    const open  = sigs.filter(s=>!s.outcome||s.outcome==='OPEN').length;
    const decided = wins+losses;
    const rate = decided>0 ? Math.round(wins/decided*100) : null;
    const pnl  = sigs.reduce((a,s)=>a+(s.pnl_pct||0),0);

    document.getElementById('ap-grid').innerHTML = [
      ['Total Signals',    total||'—',  ''],
      ['Target Hits',      total?wins:'—',   'color:var(--green)'],
      ['Stop Hits',        total?losses:'—', 'color:var(--red)'],
      ['Open Trades',      total?open:'—',   'color:var(--gold)'],
      ['Win Rate',         rate!=null?rate+'%':'—', rate!=null?(rate>=50?'color:var(--green)':'color:var(--red)'):''],
      ['Hyp. P&L',         total?(pnl>=0?'+':'')+pnl.toFixed(2)+'%':'—', pnl>=0?'color:var(--green)':'color:var(--red)'],
      ['Posts Tracked',    posts.length||'—', ''],
    ].map(([label,value,style])=>`
      <div class="ap-box">
        <div class="ap-box-label">${label}</div>
        <div class="ap-box-value" style="${style}">${value}</div>
      </div>`).join('');
  }

  // ── NEW POSTS BANNER ──
  function showNewPosts() {
    document.getElementById('new-banner').classList.remove('show');
    renderFeed(pendingNewIds);
    pendingNewIds = [];
    // Re-select if the selected post is still there
    if (selectedId) {
      setTimeout(()=>{ const c=document.querySelector(`[data-id="${selectedId}"]`); if(c) c.classList.add('selected'); },0);
    }
  }

  // ── DATA FETCH ──
  async function sb(path) {
    const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
      headers:{ apikey:SB_KEY, Authorization:`Bearer ${SB_KEY}` }
    });
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }

  async function loadData(isRefresh=false) {
    try {
      const [newPosts, clsList, sigList] = await Promise.all([
        sb('posts?select=post_id,posted_at,content&order=posted_at.desc&limit=50'),
        sb('classifications?select=*&order=created_at.desc&limit=200'),
        sb('signals?select=*&order=created_at.desc&limit=200'),
      ]);

      const newClsMap={}, newSigMap={};
      for (const c of clsList) { if (!newClsMap[c.post_id]) newClsMap[c.post_id]=c; }
      for (const s of sigList) {
        if (!newSigMap[s.post_id]) newSigMap[s.post_id]=[];
        newSigMap[s.post_id].push(s);
      }

      if (isRefresh) {
        const existingIds = new Set(posts.map(p=>p.post_id));
        const freshIds = newPosts.filter(p=>!existingIds.has(p.post_id)).map(p=>p.post_id);
        if (freshIds.length) {
          pendingNewIds = freshIds;
          document.getElementById('new-banner').classList.add('show');
        }
      }

      posts = newPosts; clsMap = newClsMap; sigMap = newSigMap;

      if (!isRefresh) {
        renderFeed();
        // Auto-select the most recent post with a signal
        const first = posts.find(p=>sigMap[p.post_id]?.length);
        if (first) selectPost(first.post_id);
      } else {
        // Silently update data; if no pending new posts just re-render in place
        if (!pendingNewIds.length) renderFeed();
        if (selectedId) renderRightPanel(selectedId);
      }

      lastLoad = new Date();
      updateStatus();
    } catch(e) {
      console.error(e);
      document.getElementById('monitor-status').textContent = 'Connection error';
    }
  }

  // ── MONITOR STATUS COUNTER ──
  function updateStatus() {
    if (!lastLoad) return;
    const s = Math.floor((Date.now()-lastLoad.getTime())/1000);
    const el = document.getElementById('monitor-status');
    if (s < 5)  el.textContent = 'Just checked';
    else if (s < 60)  el.textContent = `Checked ${s}s ago`;
    else el.textContent = `Checked ${Math.floor(s/60)}m ago`;
  }

  // ── INIT ──
  loadData(false);
  setInterval(()=>loadData(true), 30000);
  setInterval(updateStatus, 1000);
</script>
</body>
